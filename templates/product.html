<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #121212;
            color: white;
        }

        .sidebar {
            min-height: 100vh;
            background: #1c1c1c;
        }

        .active-menu {
            color: #28a745 !important;
        }

        .glass-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box input,
        .form-control,
        .form-select,
        textarea {
            background: #222;
            border: 1px solid #444;
            color: white;
        }

        .search-box input::placeholder,
        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus,
        .form-select:focus {
            background: #222;
            color: white;
            border-color: #28a745;
            box-shadow: none;
        }

        .input-group-text {
            border: 1px solid #444;
        }

        .icon-btn {
            background: #222;
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .upload-box {
            border: 2px dashed #666;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
        }

        .upload-box:hover {
            border-color: #28a745;
        }

        .nav-link {
            color: white;
        }

        .nav-link:hover {
            color: #28a745;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-lg-2 sidebar p-4">
            <h3 class="mb-5">
                <span class="text-success">Stock</span>Board
            </h3>

            <ul class="nav flex-column">
                <li class="nav-item mb-3">
                    <a href="#" class="nav-link">
                        <i class="bi bi-grid"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link active-menu">
                        <i class="bi bi-box"></i> Products
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link">
                        <i class="bi bi-bell"></i> Alerts
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link">
                        <i class="bi bi-folder"></i> Categories
                    </a>
                </li>

                <li class="nav-item mb-3">
                    <a href="#" class="nav-link">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-lg-7 p-4">

            <!-- Header -->
            <div class="d-flex justify-content-end align-items-center gap-3 mb-5">

                <div class="input-group search-box" style="width:300px;">
                    <input type="text" class="form-control" placeholder="Search anything...">
                    <span class="input-group-text bg-transparent text-white">
                        <i class="bi bi-search"></i>
                    </span>
                </div>

                <button class="btn icon-btn">
                    <i class="bi bi-question-circle"></i>
                </button>

                <div class="position-relative">
                    <button class="btn icon-btn">
                        <i class="bi bi-bell"></i>
                    </button>

                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">
                        3
                    </span>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <div class="avatar">AD</div>

                    <div>
                        <div class="fw-bold">Admin User</div>
                        <small class="text-secondary">
                            admin@stockboard.com
                        </small>
                    </div>

                    <i class="bi bi-chevron-down"></i>
                </div>
            </div>

            <!-- Product Form -->
            <h2>Add Product</h2>
            <p class="text-success">Products / Add Product</p>

            <div class="glass-card p-4">

                <h4 class="mb-4">Product Information</h4>

                <div class="row">

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" placeholder="Enter product name">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">SKU</label>
                        <input type="text" class="form-control" placeholder="PRD-001">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Category</label>
                        <select class="form-select">
                            <option>Select category</option>
                            <option>Electronics</option>
                            <option>Furniture</option>
                            <option>Accessories</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control" placeholder="Enter quantity">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Price</label>
                        <input type="number" class="form-control" placeholder="$0.00">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Supplier</label>
                        <input type="text" class="form-control" placeholder="Supplier name">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Stock Threshold</label>
                        <input type="number" class="form-control" placeholder="Threshold">
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">Product Image</label>

                        <div class="upload-box">
                            <i class="bi bi-cloud-upload fs-1"></i>
                            <p class="mb-0">Drag and Drop Image Here</p>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="5"></textarea>
                    </div>

                </div>

                <div class="mt-4 text-end">
                    <button class="btn btn-outline-light">
                        Cancel
                    </button>

                    <button class="btn btn-success">
                        Save Product
                    </button>
                </div>

            </div>

        </div>

        <!-- Preview Section -->
        <div class="col-lg-3 p-4">

            <div class="glass-card p-4">

                <h4>Live Preview</h4>

                <img src="../static/image/watch.webp"
                     class="img-fluid rounded my-4"
                     alt="Product Image">

                <h3>Smart Watch Pro</h3>

                <span class="badge bg-success">
                    Wearables
                </span>

                <div class="d-flex justify-content-between mt-3">
                    <p>Quantity</p>
                    <p class="text-success">120</p>
                </div>

                <div class="d-flex justify-content-between">
                    <p>Price</p>
                    <p class="text-success">$129.99</p>
                </div>

                <div class="d-flex justify-content-between">
                    <p>Supplier</p>
                    <p>TechGear Inc.</p>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
